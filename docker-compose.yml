version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hms_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: hms
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # Important for MongoDB startup

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms_backend
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/hms?authSource=admin
      JWT_SECRET: your_super_secret_key
      JWT_EXPIRE: 7d
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: /api
      VITE_APP_NAME: HMS
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  mongodb_data:
    driver: local